# Managed by the Smarbiz deployment workflow.
# The server already owns ports 80/443 with Nginx and Certbot certificates.

server {
    listen 80;
    listen [::]:80;
    server_name smarbiz.sbs www.smarbiz.sbs;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://smarbiz.sbs$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smarbiz.sbs;

    ssl_certificate /etc/letsencrypt/live/smarbiz.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smarbiz.sbs/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.smarbiz.sbs;

    ssl_certificate /etc/letsencrypt/live/smarbiz.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smarbiz.sbs/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://smarbiz.sbs$request_uri;
}

# Preserve the existing API subdomain while the browser application uses /api.
server {
    listen 80;
    listen [::]:80;
    server_name api.smarbiz.sbs;
    return 301 https://api.smarbiz.sbs$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.smarbiz.sbs;

    ssl_certificate /etc/letsencrypt/live/smarbiz.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smarbiz.sbs/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:18000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
