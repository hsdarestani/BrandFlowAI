name: smarbiz

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: smarbiz
      POSTGRES_USER: smarbiz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarbiz -d smarbiz"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smarbiz]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [smarbiz]

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+psycopg://smarbiz:${POSTGRES_PASSWORD}@postgres:5432/smarbiz
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: https://smarbiz.sbs,https://www.smarbiz.sbs
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "127.0.0.1:18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks: [smarbiz]

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:-false}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:13000:3000"
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks: [smarbiz]

networks:
  smarbiz:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
