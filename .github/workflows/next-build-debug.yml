name: Next Build Diagnostics

on:
  push:
    branches: [agent/smarbiz-release]
    paths: [.github/workflows/next-build-debug.yml]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: apps/web
        run: npm install
      - name: Capture Next build
        id: build
        continue-on-error: true
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: /api
          NEXT_PUBLIC_DEMO_MODE: 'false'
        run: npm run build > /tmp/next-build.log 2>&1
      - name: Publish diagnostic
        if: always()
        uses: actions/github-script@v7
        env:
          OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const fs = require('fs');
            const title = '[Debug] Smarbiz Next build';
            let log = '';
            try { log = fs.readFileSync('/tmp/next-build.log','utf8'); } catch (_) {}
            if (log.length > 24000) log = log.slice(-24000);
            const body = `Commit: \`${context.sha}\`\n\nOutcome: **${process.env.OUTCOME}**\n\n\`\`\`text\n${log.replace(/```/g,"'''")}\n\`\`\``;
            const {data: issues} = await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'all',per_page:100});
            const existing = issues.find(issue => issue.title === title && !issue.pull_request);
            if (existing) await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:existing.number,state:'open',body});
            else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title,body});
      - name: Fail on build error
        if: steps.build.outcome != 'success'
        run: exit 1
