name: Fix TypeScript callbacks

on:
  push:
    branches: [agent/productionize-and-deploy]
    paths: [.github/workflows/fix-typescript-branch.yml]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/productionize-and-deploy
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Add explicit callback parameter types
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [
              Path('apps/web/components/assets-library.tsx'),
              Path('apps/web/components/brand-pulse-page.tsx'),
              Path('apps/web/components/integrations-page.tsx'),
              Path('apps/web/components/settings-panel.tsx'),
          ]
          for path in paths:
              text = path.read_text()
              text = text.replace('onChange={value=>', 'onChange={(value:string)=>')
              text = text.replace('onChange={(value)=>', 'onChange={(value:string)=>')
              path.write_text(text)
          PY
      - name: Validate TypeScript
        working-directory: apps/web
        run: |
          npm install
          npm run lint
      - name: Commit focused fixes
        run: |
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/components/assets-library.tsx apps/web/components/brand-pulse-page.tsx apps/web/components/integrations-page.tsx apps/web/components/settings-panel.tsx
          git commit -m 'Fix TypeScript callback parameter types'
          git push origin HEAD:agent/productionize-and-deploy
