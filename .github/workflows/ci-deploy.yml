name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: smarbiz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      DATABASE_URL: sqlite:///./ci.db
      JWT_SECRET: ci-only-secret-with-more-than-thirty-two-characters
      CONNECTOR_SECRET_KEY: ci-only-connector-secret-with-more-than-thirty-two-characters
      AUTH_RATE_LIMIT_PER_MINUTE: 1000
      NEXT_PUBLIC_API_URL: /api
      DEMO_MODE: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Run API tests
        working-directory: apps/api
        run: |
          set +e
          pytest -q --tb=short > pytest.log 2>&1
          STATUS=$?
          cat pytest.log
          exit $STATUS

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: apps/api/pytest.log
          if-no-files-found: ignore

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Type-check web
        working-directory: apps/web
        run: npm run lint

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Prepare production environment for CI
        run: cp .env.production.example .env.production

      - name: Validate production Compose
        run: docker compose --env-file .env.production -f docker-compose.prod.yml config --quiet

      - name: Build production containers
        run: docker compose --env-file .env.production -f docker-compose.prod.yml build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install SSH password client
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Package release
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='.next' --exclude='*.db' -czf /tmp/smarbiz-release.tar.gz .

      - name: Check server SSH reachability
        id: preflight
        run: timeout 12 bash -c '</dev/tcp/91.107.157.75/22'

      - name: Upload release
        id: upload
        env:
          SSHPASS: ${{ secrets.PASS }}
        run: |
          test -n "$SSHPASS" || (echo "GitHub secret PASS is missing" && exit 1)
          sshpass -e scp -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new /tmp/smarbiz-release.tar.gz root@91.107.157.75:/tmp/smarbiz-release.tar.gz

      - name: Deploy and verify
        id: remote_deploy
        env:
          SSHPASS: ${{ secrets.PASS }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          sshpass -e ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=accept-new root@91.107.157.75 "RELEASE_SHA='$RELEASE_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          export DEBIAN_FRONTEND=noninteractive
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update
            apt-get install -y ca-certificates curl openssl
            curl -fsSL https://get.docker.com | sh
          fi
          if ! docker compose version >/dev/null 2>&1; then
            apt-get update
            apt-get install -y docker-compose-plugin
          fi
          if ! command -v curl >/dev/null 2>&1 || ! command -v ufw >/dev/null 2>&1; then
            apt-get update
            apt-get install -y curl ufw
          fi

          ufw allow 22/tcp
          ufw allow 80/tcp
          ufw allow 443/tcp
          ufw allow 443/udp
          ufw --force enable
          ufw reload

          BASE=/opt/smarbiz
          RELEASE="$BASE/releases/$RELEASE_SHA"
          SHARED="$BASE/shared"
          mkdir -p "$RELEASE" "$SHARED"
          rm -rf "$RELEASE"/*
          tar -xzf /tmp/smarbiz-release.tar.gz -C "$RELEASE"
          rm -f /tmp/smarbiz-release.tar.gz

          if [ ! -f "$SHARED/.env.production" ]; then
            umask 077
            POSTGRES_PASSWORD="$(openssl rand -hex 24)"
            JWT_SECRET="$(openssl rand -hex 48)"
            CONNECTOR_SECRET_KEY="$(openssl rand -hex 48)"
            cat > "$SHARED/.env.production" <<ENV
          APP_ENV=staging
          DEMO_MODE=false
          ALLOW_MOCK_CONNECTORS=false
          ALLOW_UNSAFE_DEV_DEFAULTS=false
          REQUIRE_MIGRATIONS=true
          RUN_MIGRATIONS=true
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          DATABASE_URL=postgresql+psycopg://smarbiz:$POSTGRES_PASSWORD@postgres:5432/smarbiz
          REDIS_URL=redis://redis:6379/0
          JWT_SECRET=$JWT_SECRET
          JWT_EXPIRES_MINUTES=10080
          JWT_ISSUER=smarbiz-api
          CONNECTOR_SECRET_KEY=$CONNECTOR_SECRET_KEY
          BOOTSTRAP_SUPERADMIN_EMAIL=
          AUTH_RATE_LIMIT_PER_MINUTE=12
          AI_PROVIDER=mock
          OPENAI_API_KEY=
          ANTHROPIC_API_KEY=
          GEMINI_API_KEY=
          CORS_ORIGINS=https://smarbiz.sbs,https://www.smarbiz.sbs
          NEXT_PUBLIC_API_URL=/api
          ACME_EMAIL=admin@smarbiz.sbs
          TELEGRAM_BOT_TOKEN=
          BALE_BOT_TOKEN=
          BALE_BASE_URL=https://tapi.bale.ai/bot{token}/{method}
          BALE_SAFIR_BASE_URL=
          BALE_SAFIR_API_ACCESS_KEY=
          BALE_SAFIR_BOT_ID=
          S3_ENDPOINT=
          S3_BUCKET=smarbiz-assets
          ENV
          fi

          ln -sfn "$SHARED/.env.production" "$RELEASE/.env.production"
          ln -sfn "$RELEASE" "$BASE/current"
          cd "$BASE/current"

          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans

          READY=0
          for _ in $(seq 1 45); do
            if docker compose --env-file .env.production -f docker-compose.prod.yml exec -T api \
              python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)" >/dev/null 2>&1; then
              READY=1
              break
            fi
            sleep 4
          done

          if [ "$READY" != "1" ]; then
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
            docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=200 api postgres
            exit 1
          fi

          docker compose --env-file .env.production -f docker-compose.prod.yml exec -T web \
            node -e "fetch('http://127.0.0.1:3000/en').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"

          CADDY_READY=0
          for _ in $(seq 1 45); do
            if curl --fail --silent --show-error --insecure \
              --resolve smarbiz.sbs:443:127.0.0.1 \
              https://smarbiz.sbs/healthz >/dev/null 2>&1; then
              CADDY_READY=1
              break
            fi
            sleep 4
          done

          if [ "$CADDY_READY" != "1" ]; then
            echo "Caddy did not become healthy on the origin HTTPS endpoint."
            ss -lntup || true
            docker compose --env-file .env.production -f docker-compose.prod.yml ps
            docker compose --env-file .env.production -f docker-compose.prod.yml logs --tail=250 caddy
            exit 1
          fi

          docker image prune -f
          find "$BASE/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | sort -nr | tail -n +4 | cut -d' ' -f2- | xargs -r rm -rf
          ufw status verbose
          docker compose --env-file .env.production -f docker-compose.prod.yml ps
          REMOTE

      - name: Report production deployment
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          PREFLIGHT_CONCLUSION: ${{ steps.preflight.conclusion }}
          UPLOAD_CONCLUSION: ${{ steps.upload.conclusion }}
          DEPLOY_CONCLUSION: ${{ steps.remote_deploy.conclusion }}
        with:
          script: |
            const title = '[Deploy] Smarbiz production status';
            const success = process.env.JOB_STATUS === 'success';
            const marker = success ? '✅ Successful' : '❌ Failed';
            const body = [
              `## ${marker}`,
              '',
              `- Commit: \`${context.sha}\``,
              `- SSH preflight: **${process.env.PREFLIGHT_CONCLUSION || 'not run'}**`,
              `- Release upload: **${process.env.UPLOAD_CONCLUSION || 'not run'}**`,
              `- Remote deploy, app health, Caddy, and firewall: **${process.env.DEPLOY_CONCLUSION || 'not run'}**`,
              `- Workflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              success
                ? 'The API, web, and origin HTTPS endpoint passed their health checks.'
                : 'Open the workflow link for the exact failing command.',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
