name: TypeScript Diagnostics

on:
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: apps/web
        run: npm install
      - name: Capture TypeScript output
        id: typecheck
        continue-on-error: true
        working-directory: apps/web
        run: npm run lint > typecheck.log 2>&1
      - name: Upload TypeScript output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: apps/web/typecheck.log
      - name: Fail on TypeScript errors
        if: steps.typecheck.outcome != 'success'
        run: exit 1
