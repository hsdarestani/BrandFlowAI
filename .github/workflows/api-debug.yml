name: API Test Diagnostics

on:
  push:
    branches: [agent/productionize-and-deploy]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      DATABASE_URL: sqlite:///./ci-debug.db
      JWT_SECRET: ci-only-secret-with-more-than-thirty-two-characters
      CONNECTOR_SECRET_KEY: ci-only-connector-secret-with-more-than-thirty-two-characters
      AUTH_RATE_LIMIT_PER_MINUTE: 1000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Capture pytest output
        id: pytest
        continue-on-error: true
        working-directory: apps/api
        run: pytest -q --tb=short > pytest-debug.log 2>&1
      - name: Publish diagnostic issue
        if: always()
        uses: actions/github-script@v7
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
        with:
          script: |
            const fs = require('fs');
            const title = '[Debug] BrandFlowAI API tests';
            let log = fs.readFileSync('apps/api/pytest-debug.log', 'utf8');
            if (log.length > 30000) log = log.slice(-30000);
            const body = [
              `Outcome: **${process.env.PYTEST_OUTCOME}**`,
              '',
              `Commit: \`${context.sha}\``,
              '',
              '```text',
              log.replace(/```/g, "'''"),
              '```',
            ].join('\n');
            const {data: issues} = await github.rest.issues.listForRepo({owner:context.repo.owner,repo:context.repo.repo,state:'all',per_page:100});
            const existing = issues.find(issue => issue.title === title && !issue.pull_request);
            if (existing) await github.rest.issues.update({owner:context.repo.owner,repo:context.repo.repo,issue_number:existing.number,state:'open',body});
            else await github.rest.issues.create({owner:context.repo.owner,repo:context.repo.repo,title,body});
      - name: Fail on pytest errors
        if: steps.pytest.outcome != 'success'
        run: exit 1
